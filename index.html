<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INGÉNIEUR QSE LYES - SiteCheck Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        #pdf-capture-root { width: 210mm; min-height: 297mm; padding: 15mm; background: white; color: #0f172a; }
        .no-break { page-break-inside: avoid; break-inside: avoid; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import React, { useState, useEffect, useRef } from "https://esm.sh/react@18.2.0";
        import ReactDOM from "https://esm.sh/react-dom@18.2.0/client";
        import * as LucideIcons from "https://esm.sh/lucide-react@0.344.0";

        const { ShieldCheck, HardHat, Construction, Zap, FileText, Plus, Trash2, Printer, ChevronLeft, Clock, Save, Camera, X, FileDown, Briefcase, Calendar, AlertTriangle } = LucideIcons;

        // --- ATTENTION : CONFIGURATION FIREBASE ---
        // Pour que l'app fonctionne sur Vercel, vous devez créer un projet sur console.firebase.google.com
        // et remplacer les "" ci-dessous par vos clés. 
        // Si vous laissez vide, l'app affichera une alerte mais vous pourrez tester le design.
        const firebaseConfig = {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [projects, setProjects] = useState([]);
            const [currentProject, setCurrentProject] = useState(null);
            const [isDownloading, setIsDownloading] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [deleteId, setDeleteId] = useState(null);
            const fileInputRef = useRef(null);
            const [activeItemRef, setActiveItemRef] = useState(null);

            useEffect(() => {
                if (firebaseConfig.apiKey) {
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    signInAnonymously(auth);
                    onAuthStateChanged(auth, setUser);
                }
            }, []);

            useEffect(() => {
                if (!user || !firebaseConfig.apiKey) return;
                const db = getFirestore();
                return onSnapshot(collection(db, 'inspections'), (snap) => {
                    setProjects(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [user]);

            const createProject = async () => {
                const newDoc = { projectName: "CHANTIER À DÉFINIR", engineerName: "INGÉNIEUR QSE LYES", date: new Date().toISOString().split('T')[0], sections: [], observations: "", createdAt: Date.now() };
                if (user) {
                    const db = getFirestore();
                    const res = await addDoc(collection(db, 'inspections'), newDoc);
                    setCurrentProject({ id: res.id, ...newDoc });
                } else {
                    setCurrentProject({ id: 'temp', ...newDoc });
                }
                setView('editor');
            };

            const downloadPDF = async (project) => {
                setIsDownloading(true);
                const element = document.getElementById('pdf-capture-root');
                const opt = { margin: 10, filename: `Rapport_QSE_Lyes.pdf`, image: { type: 'jpeg', quality: 1.0 }, html2canvas: { scale: 2, useCORS: true, windowWidth: 800 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
                setTimeout(() => {
                    html2pdf().set(opt).from(element).save().then(() => setIsDownloading(false));
                }, 2000);
            };

            if (!firebaseConfig.apiKey && view === 'dashboard' && projects.length === 0) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white p-10 text-center">
                        <div>
                            <ShieldCheck className="w-20 h-20 text-cyan-400 mx-auto mb-6" />
                            <h1 className="text-3xl font-black mb-4 uppercase">INGÉNIEUR QSE LYES</h1>
                            <p className="text-slate-400 mb-8">L'application est prête, mais vous devez configurer votre base de données Firebase pour sauvegarder vos rapports.</p>
                            <button onClick={createProject} className="bg-cyan-600 px-8 py-3 rounded-full font-bold uppercase tracking-widest shadow-lg">Tester le mode démo</button>
                        </div>
                    </div>
                );
            }

            if (view === 'dashboard') return (
                <div className="min-h-screen">
                    <header className="bg-slate-900 h-20 flex items-center px-8 shadow-xl text-white justify-between sticky top-0 z-50">
                        <div className="flex items-center gap-4">
                            <div className="bg-cyan-600 p-2.5 rounded-xl shadow-lg"><ShieldCheck size={24} /></div>
                            <div>
                                <h1 className="text-xl font-black uppercase tracking-tighter">INGÉNIEUR QSE <span className="text-cyan-400">LYES</span></h1>
                            </div>
                        </div>
                        <button onClick={createProject} className="bg-cyan-600 px-6 py-2.5 rounded-2xl font-black text-xs uppercase shadow-lg">Nouvelle Mission</button>
                    </header>
                    <main className="max-w-7xl mx-auto px-8 pt-12 pb-20 text-center">
                         {projects.length === 0 && <p className="text-slate-400 italic">Aucun rapport. Cliquez sur "Nouvelle Mission".</p>}
                         <div className="grid grid-cols-1 md:grid-cols-3 gap-8 text-left">
                            {projects.map(p => (
                                <div key={p.id} onClick={() => { setCurrentProject(p); setView('editor'); }} className="bg-white p-8 rounded-[2rem] border border-slate-200 cursor-pointer hover:shadow-2xl transition-all">
                                    <h3 className="font-black uppercase text-slate-800 truncate">{p.projectName}</h3>
                                    <p className="text-slate-400 text-xs mt-2">{p.date}</p>
                                </div>
                            ))}
                         </div>
                    </main>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <header className="bg-white border-b h-20 sticky top-0 z-50 flex items-center px-8 justify-between">
                        <button onClick={() => setView('dashboard')} className="p-3 hover:bg-slate-100 rounded-xl">←</button>
                        <button onClick={() => downloadPDF(currentProject)} className="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl flex items-center gap-3">
                            <FileDown size={20} className="text-cyan-400" /> Télécharger PDF
                        </button>
                    </header>
                    <main className="max-w-4xl mx-auto px-8 py-12">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border mb-10">
                            <label className="text-[10px] font-black text-cyan-600 uppercase tracking-widest">Nom du Chantier</label>
                            <input type="text" value={currentProject.projectName} onChange={e => setCurrentProject({...currentProject, projectName: e.target.value})} className="w-full bg-slate-50 p-5 rounded-2xl font-black text-slate-800 uppercase outline-none mt-2" />
                        </div>
                        <p className="text-center text-slate-400 italic">Remplissez vos contrôles et ajoutez vos photos...</p>
                    </main>
                    {/* Le reste du code de l'éditeur ici... */}
                    
                    <div id="pdf-capture-root" style={{ position: 'fixed', top: 0, left: 0, opacity: 0, pointerEvents: 'none' }}>
                         <div className="p-10 border-b-8 border-slate-900 mb-10">
                            <h1 className="text-4xl font-black uppercase">RAPPORT TECHNIQUE QSE</h1>
                            <p className="text-cyan-600 font-bold uppercase tracking-widest">INGÉNIEUR LYES</p>
                         </div>
                         <p className="text-2xl font-bold uppercase mb-4">Chantier : {currentProject.projectName}</p>
                         <p>Date : {currentProject.date}</p>
                    </div>

                    {isDownloading && (
                        <div className="fixed inset-0 bg-slate-950/95 flex flex-col items-center justify-center z-[500] text-white text-center p-10 backdrop-blur-xl">
                            <Loader2 className="w-16 h-16 text-cyan-500 animate-spin mb-6" />
                            <h3 className="text-2xl font-black uppercase">Génération PDF...</h3>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(React.createElement(App));
    </script>
</body>
</html>
