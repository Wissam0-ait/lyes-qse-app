<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INGÉNIEUR QSE LYES - SiteCheck Pro</title>
    <!-- Tailwind CSS pour le design pro -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2pdf pour la génération du PDF direct -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Polices Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Style spécifique pour forcer le rendu PDF propre */
        #pdf-capture-root {
            width: 210mm;
            min-height: 297mm;
            padding: 15mm;
            background: white;
            color: #0f172a;
        }
        .break-inside-avoid { page-break-inside: avoid; break-inside: avoid; }
    </style>
</head>
<body class="bg-[#F8FAFC]">

    <div id="root"></div>

    <script type="module">
        // Import des librairies React et Firebase via CDN pour éviter l'installation locale
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import React, { useState, useEffect, useRef } from "https://esm.sh/react@18.2.0";
        import ReactDOM from "https://esm.sh/react-dom@18.2.0/client";
        import { 
            ShieldCheck, HardHat, Construction, Zap, FileText, 
            Plus, Trash2, Printer, ChevronLeft, Clock, Save, 
            Camera, X, FileDown, Briefcase, Calendar, User, Search
        } from "https://esm.sh/lucide-react";

        // Configuration Firebase (Utilise les variables de l'environnement)
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sitecheck-lyes-qse-v1';

        const DEFAULT_SECTIONS = [
            { id: 1, title: "VÉRIFICATIONS SÉCURITÉ (S)", items: [{ id: 101, label: "Signalisation et balisage", status: "none", comment: "", photos: [] }, { id: 102, label: "Port des EPI", status: "none", comment: "", photos: [] }] },
            { id: 2, title: "CONTRÔLE QUALITÉ (Q)", items: [{ id: 201, label: "Conformité du ferraillage", status: "none", comment: "", photos: [] }, { id: 202, label: "Qualité du béton", status: "none", comment: "", photos: [] }] },
            { id: 3, title: "ENVIRONNEMENT (E)", items: [{ id: 301, label: "Tri des déchets", status: "none", comment: "", photos: [] }] }
        ];

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [projects, setProjects] = useState([]);
            const [currentProject, setCurrentProject] = useState(null);
            const [isDownloading, setIsDownloading] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [deleteId, setDeleteId] = useState(null);
            const fileInputRef = useRef(null);
            const [activeItemRef, setActiveItemRef] = useState(null);

            useEffect(() => {
                signInAnonymously(auth);
                onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                return onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'inspections'), (snap) => {
                    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setProjects(list.sort((a, b) => b.createdAt - a.createdAt));
                });
            }, [user]);

            const createProject = async () => {
                const newDoc = { 
                    projectName: "CHANTIER À DÉFINIR", 
                    engineerName: "INGÉNIEUR QSE LYES", 
                    date: new Date().toISOString().split('T')[0], 
                    sections: DEFAULT_SECTIONS, 
                    observations: "", 
                    createdAt: Date.now() 
                };
                const res = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'inspections'), newDoc);
                setCurrentProject({ id: res.id, ...newDoc });
                setView('editor');
            };

            const save = async (data) => {
                if (!currentProject) return;
                setIsSaving(true);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inspections', currentProject.id), data);
                setIsSaving(false);
            };

            const downloadPDF = async (project) => {
                setIsDownloading(true);
                const element = document.getElementById('pdf-capture-root');
                const opt = {
                    margin: 10,
                    filename: `RAPPORT_QSE_LYES_${project.projectName}.pdf`,
                    image: { type: 'jpeg', quality: 1.0 },
                    html2canvas: { scale: 2, useCORS: true, windowWidth: 800 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
                };
                setTimeout(() => {
                    html2pdf().set(opt).from(element).save().then(() => setIsDownloading(false));
                }, 2000);
            };

            const handlePhoto = (e) => {
                const file = e.target.files[0];
                if (!file || !activeItemRef) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64 = reader.result;
                    const { sId, iId } = activeItemRef;
                    const newS = currentProject.sections.map(s => s.id === sId ? {
                        ...s, items: s.items.map(i => i.id === iId ? { ...i, photos: [...(i.photos || []), base64] } : i)
                    } : s);
                    setCurrentProject(p => ({ ...p, sections: newS }));
                    save({ sections: newS });
                };
                reader.readAsDataURL(file);
            };

            // --- VUE DASHBOARD ---
            if (view === 'dashboard') return (
                <div className="min-h-screen">
                    <header className="bg-slate-900 h-20 flex items-center px-8 shadow-xl text-white justify-between sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <ShieldCheck className="text-cyan-400" size={28} />
                            <h1 className="text-xl font-black uppercase tracking-tighter">INGÉNIEUR QSE <span className="text-cyan-400">LYES</span></h1>
                        </div>
                        <button onClick={createProject} className="bg-cyan-600 px-6 py-2.5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-cyan-900/40 active:scale-95 transition-all">Nouvelle Mission</button>
                    </header>
                    <main className="max-w-7xl mx-auto px-8 pt-12 pb-20">
                        <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tighter mb-8 px-2 border-l-4 border-cyan-600">Tableau de bord</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {projects.map(p => (
                                <div key={p.id} onClick={() => { setCurrentProject(p); setView('editor'); }} className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200 cursor-pointer hover:shadow-2xl hover:border-cyan-500/30 transition-all relative group">
                                    <div className="flex justify-between items-start mb-10">
                                        <div className="bg-slate-50 text-slate-400 w-14 h-14 rounded-2xl flex items-center justify-center group-hover:bg-slate-900 group-hover:text-cyan-400 transition-all">
                                            <FileText size={28} />
                                        </div>
                                        <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button onClick={(e) => { e.stopPropagation(); setCurrentProject(p); downloadPDF(p); }} className="p-2 bg-slate-50 rounded-xl hover:text-cyan-600 border border-slate-100"><Printer size={18} /></button>
                                            <button onClick={(e) => { e.stopPropagation(); setDeleteId(p.id); }} className="p-2 bg-slate-50 rounded-xl hover:text-red-600 border border-slate-100"><Trash2 size={18} /></button>
                                        </div>
                                    </div>
                                    <h3 className="font-black uppercase text-slate-800 truncate text-lg group-hover:text-cyan-700 transition-colors">{p.projectName}</h3>
                                    <div className="flex items-center gap-2 text-slate-400 text-[10px] font-bold mt-2 uppercase tracking-widest"><Calendar size={12} className="text-cyan-500" /> {p.date}</div>
                                    <div className="mt-8 pt-6 border-t border-slate-50 flex items-center justify-between text-[10px] font-black uppercase text-slate-400 tracking-widest">Voir le Rapport <div className="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center">→</div></div>
                                </div>
                            ))}
                        </div>
                    </main>
                    {deleteId && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center">
                                <AlertTriangle className="text-red-500 w-12 h-12 mx-auto mb-4" />
                                <h3 className="text-xl font-black uppercase text-slate-900 mb-2">Supprimer ?</h3>
                                <p className="text-slate-500 text-sm mb-8">Toutes les données QSE seront effacées.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setDeleteId(null)} className="flex-1 py-3 bg-slate-100 rounded-2xl font-black text-xs uppercase">Non</button>
                                    <button onClick={async () => { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inspections', deleteId)); setDeleteId(null); }} className="flex-1 py-3 bg-red-600 text-white rounded-2xl font-black text-xs uppercase shadow-xl">Oui, supprimer</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            // --- VUE ÉDITEUR ---
            return (
                <div className="min-h-screen">
                    <header className="bg-white/80 backdrop-blur-xl border-b h-20 sticky top-0 z-50 flex items-center px-8 justify-between">
                        <div className="flex items-center gap-6">
                            <button onClick={() => setView('dashboard')} className="p-3 hover:bg-slate-100 rounded-2xl text-slate-500 border shadow-sm"><ChevronLeft size={24} /></button>
                            <div>
                                <h2 className="font-black uppercase text-xs tracking-widest text-slate-900">{currentProject.projectName}</h2>
                                <div className="flex items-center gap-1.5 mt-0.5"><div className={`w-2 h-2 rounded-full ${isSaving ? 'bg-cyan-500 animate-ping' : 'bg-green-500'}`}></div><span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{isSaving ? 'Sync...' : 'Sécurisé'}</span></div>
                            </div>
                        </div>
                        <button onClick={() => downloadPDF(currentProject)} className="bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl flex items-center gap-2">
                            <FileDown size={18} className="text-cyan-400" /> Télécharger PDF Pro
                        </button>
                    </header>
                    
                    <main className="max-w-5xl mx-auto px-8 py-12">
                        <div className="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-200 mb-10 grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-cyan-600 uppercase tracking-widest px-1">Nom du Chantier</label>
                                <input type="text" value={currentProject.projectName} onChange={e => { const v = e.target.value; setCurrentProject(p=>({...p, projectName:v})); save({projectName:v}); }} className="w-full bg-slate-50 p-4 rounded-2xl font-black text-slate-800 uppercase focus:ring-2 focus:ring-cyan-500 outline-none" />
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-cyan-600 uppercase tracking-widest px-1">Date</label>
                                <input type="date" value={currentProject.date} onChange={e => { const v = e.target.value; setCurrentProject(p=>({...p, date:v})); save({date:v}); }} className="w-full bg-slate-50 p-4 rounded-2xl font-bold focus:ring-2 focus:ring-cyan-500 outline-none" />
                            </div>
                        </div>

                        {currentProject.sections.map(s => (
                            <div key={s.id} className="bg-white rounded-[2.5rem] border border-slate-200 mb-12 overflow-hidden shadow-sm">
                                <div className="bg-slate-900 text-white px-10 py-5 font-black uppercase tracking-[0.25em] text-xs border-l-[15px] border-cyan-500">{s.title}</div>
                                <div className="divide-y divide-slate-50">
                                    {s.items.map(item => (
                                        <div key={item.id} className="p-10 hover:bg-slate-50/40 transition-colors">
                                            <div className="flex flex-col lg:flex-row justify-between gap-8 mb-6">
                                                <div className="flex-grow">
                                                    <p className="font-black text-slate-800 text-lg uppercase tracking-tight mb-2">{item.label}</p>
                                                    <textarea value={item.comment} placeholder="Observations QSE détaillées..." onChange={e => {
                                                        const v = e.target.value;
                                                        const newS = currentProject.sections.map(sec => sec.id === s.id ? {...sec, items: sec.items.map(i => i.id === item.id ? {...i, comment: v} : i)} : sec);
                                                        setCurrentProject(p=>({...p, sections:newS})); save({sections:newS});
                                                    }} className="w-full text-sm italic bg-transparent border-b outline-none focus:border-cyan-500 py-1 text-slate-500" />
                                                </div>
                                                <div className="flex gap-2 shrink-0">
                                                    {['ok', 'issue', 'na'].map(st => (
                                                        <button key={st} onClick={() => {
                                                            const newS = currentProject.sections.map(sec => sec.id === s.id ? {...sec, items: sec.items.map(i => i.id === item.id ? {...i, status: st} : i)} : sec);
                                                            setCurrentProject(p=>({...p, sections:newS})); save({sections:newS});
                                                        }} className={`px-5 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${item.status === st ? (st === 'ok' ? 'bg-green-600 text-white shadow-lg shadow-green-100' : st === 'issue' ? 'bg-red-600 text-white shadow-lg shadow-red-100' : 'bg-slate-900 text-white') : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>
                                                            {st === 'ok' ? 'CONFORME' : st === 'issue' ? 'RÉSERVE' : 'N/A'}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="flex flex-wrap gap-4">
                                                {(item.photos || []).map((ph, idx) => (
                                                    <div key={idx} className="relative group w-24 h-24 border-4 border-white rounded-[1.5rem] overflow-hidden shadow-md">
                                                        <img src={ph} className="w-full h-full object-cover" />
                                                        <button onClick={() => {
                                                            const newS = currentProject.sections.map(sec => sec.id === s.id ? {...sec, items: sec.items.map(i => i.id === item.id ? {...i, photos: i.photos.filter((_, pi) => pi !== idx)} : i)} : sec);
                                                            setCurrentProject(p=>({...p, sections:newS})); save({sections:newS});
                                                        }} className="absolute inset-0 bg-red-600/80 flex items-center justify-center text-white opacity-0 group-hover:opacity-100 transition-all"><X size={20}/></button>
                                                    </div>
                                                ))}
                                                <button onClick={() => { setActiveItemRef({sId:s.id, iId:item.id}); fileInputRef.current.click(); }} className="w-24 h-24 border-2 border-dashed border-slate-200 rounded-[1.5rem] flex flex-col items-center justify-center text-slate-300 hover:text-cyan-600 transition-all bg-slate-50/50"><Camera size={24} /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}

                        <div className="bg-white p-12 rounded-[3rem] border border-slate-200 shadow-sm">
                             <h2 className="text-[11px] font-black uppercase tracking-[0.4em] text-cyan-600 mb-6 border-l-4 border-slate-900 px-4">Synthèse Finale de l'Expert</h2>
                             <textarea rows="6" value={currentProject.observations} onChange={e => { const v = e.target.value; setCurrentProject(p=>({...p, observations:v})); save({observations:v}); }} className="w-full bg-slate-50 p-8 rounded-[2rem] font-bold text-slate-700 leading-relaxed outline-none shadow-inner" placeholder="Récapitulatif global..." />
                        </div>
                    </main>

                    {/* PDF CAPTURE LAYER (INVISIBLE MAIS PRÉSENT POUR LE RENDU) */}
                    <div style={{ position: 'fixed', top: '0', left: '0', opacity: 0.01, zIndex: -10, pointerEvents: 'none', width: '210mm' }}>
                        <div id="pdf-capture-root" className="bg-white p-12 text-slate-900" style={{ width: '210mm', minHeight: '297mm', padding: '15mm' }}>
                            {projectToPrint && (
                                <>
                                    <div className="flex justify-between items-center mb-12 border-b-[10px] border-slate-900 pb-10">
                                        <div style={{ width: '65%' }}>
                                            <div className="text-cyan-700 font-black uppercase tracking-[0.5em] text-[12px] mb-3">Qualité • Sécurité • Environnement</div>
                                            <h1 className="text-4xl font-black text-slate-900 uppercase tracking-tighter leading-none">RAPPORT TECHNIQUE</h1>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-2xl font-black text-slate-900 leading-none">INGÉNIEUR <span className="text-cyan-600 uppercase">LYES</span></div>
                                            <div className="text-[9px] text-slate-400 mt-2 uppercase font-black tracking-widest italic">Contrôle de Conformité Chantier</div>
                                        </div>
                                    </div>
                                    <table style={{ width: '100%', marginBottom: '40px', border: '4px solid #0f172a', borderCollapse: 'collapse' }}>
                                        <tbody>
                                            <tr>
                                                <td style={{ padding: '25px', borderRight: '4px solid #0f172a', width: '60%' }}>
                                                    <p style={{ fontSize: '9px', fontWeight: '900', color: '#94a3b8', textTransform: 'uppercase', marginBottom: '8px' }}>CHANTIER</p>
                                                    <p style={{ fontSize: '24px', fontWeight: '900', textTransform: 'uppercase', lineHeight: '1.1' }}>{projectToPrint.projectName}</p>
                                                </td>
                                                <td style={{ padding: '25px', backgroundColor: '#f8fafc' }}>
                                                    <p style={{ fontSize: '9px', fontWeight: '900', color: '#94a3b8', textTransform: 'uppercase' }}>DATE</p>
                                                    <p style={{ fontSize: '18px', fontWeight: '900', marginBottom: '15px' }}>{projectToPrint.date}</p>
                                                    <p style={{ fontSize: '9px', fontWeight: '900', color: '#94a3b8', textTransform: 'uppercase' }}>INGÉNIEUR : LYES</p>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                    {projectToPrint.sections.map(s => (
                                        <div key={s.id} className="mb-12 break-inside-avoid" style={{ pageBreakInside: 'avoid' }}>
                                            <div className="bg-slate-900 text-white px-8 py-3.5 font-black uppercase text-[11px] tracking-[0.3em] mb-8 border-l-[12px] border-cyan-500 rounded-r-xl">{s.title}</div>
                                            {s.items.map(item => (
                                                <div key={item.id} className="border-b-2 border-slate-50 pb-8 mb-8 break-inside-avoid" style={{ pageBreakInside: 'avoid' }}>
                                                    <div className="flex justify-between items-start mb-4 gap-6">
                                                        <p className="font-black text-slate-900 text-lg flex-grow uppercase leading-tight">{item.label}</p>
                                                        <div style={{ padding: '10px 20px', border: '3px solid', borderRadius: '40px', fontWeight: '900', fontSize: '11px' }} className={item.status === 'ok' ? 'border-green-600 text-green-700 bg-green-50' : item.status === 'issue' ? 'border-red-600 text-red-700 bg-red-50' : 'border-slate-200 text-slate-300'}>{item.status.toUpperCase()}</div>
                                                    </div>
                                                    {item.comment && <div className="bg-slate-50 p-6 rounded-2xl border-l-4 border-slate-200 mb-6 italic font-bold text-slate-600 text-sm">"{item.comment}"</div>}
                                                    {item.photos && item.photos.length > 0 && (
                                                        <div className="grid grid-cols-2 gap-4 mt-6">
                                                            {item.photos.map((ph, i) => <img key={i} src={ph} style={{ height: '70mm', borderRadius: '30px', border: '6px solid #f1f5f9', objectFit: 'cover' }} />)}
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    ))}
                                    <div className="mt-20 pt-10 border-t-[8px] border-slate-900 break-inside-avoid" style={{ pageBreakInside: 'avoid' }}>
                                        <h3 className="text-[12px] font-black uppercase tracking-[0.4em] text-cyan-700 mb-6 text-center">CONCLUSION GÉNÉRALE QSE</h3>
                                        <div className="bg-slate-900 text-white p-12 rounded-[3.5rem] shadow-2xl relative overflow-hidden text-center italic font-black text-lg leading-relaxed">
                                            <div className="absolute top-0 left-0 w-3 h-full bg-cyan-500"></div>
                                            "{projectToPrint.observations || "Site conforme."}"
                                        </div>
                                    </div>
                                    <div className="mt-20 grid grid-cols-2 gap-16 break-inside-avoid" style={{ pageBreakInside: 'avoid' }}>
                                        <div className="border-t-2 border-slate-200 pt-6 h-40"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-24">Visa Ingénieur QSE LYES</p></div>
                                        <div className="border-t-2 border-slate-200 pt-6 h-40 text-right"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-24">Visa Responsable Chantier</p></div>
                                    </div>
                                    <footer className="mt-32 text-center text-[9px] text-slate-300 uppercase tracking-[0.6em] border-t border-slate-50 pt-10 font-black">INGÉNIEUR QSE LYES • DOCUMENT OFFICIEL</footer>
                                </>
                            )}
                        </div>
                    </div>

                    {/* UI: LOADER */}
                    {isDownloading && (
                        <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-md flex flex-col items-center justify-center z-[500] text-white p-8 text-center">
                            <Loader2 className="w-16 h-16 text-cyan-500 animate-spin mb-6" />
                            <h3 className="text-xl font-black uppercase tracking-tighter">Édition PDF Finale...</h3>
                            <p className="text-slate-500 text-sm mt-2 font-bold italic">Ne fermez pas cette page.</p>
                        </div>
                    )}
                    <input type="file" accept="image/*" className="hidden" ref={fileInputRef} onChange={handlePhoto} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(React.createElement(App));
    </script>
</body>
</html>
